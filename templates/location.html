<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>
.box {
    background: rgba(255,255,255,0.9);
    padding: 30px;
    border-radius: 15px;
    width: 300px;
    text-align: center;
    box-shadow: 0 0 20px rgba(0,0,0,0.2);
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}
input {
    width: 90%;
    padding: 10px;
    margin: 10px;
}
button {
    padding: 10px;
    background: #4facfe;
    color: white;
    border: none;
    cursor: pointer;
}
.slideshow img {
    width: 100%;
    height: 100vh;
    object-fit: cover;
}
</style>
</head>

<body>

<div class="slideshow">
    <img src="{{ url_for('static', filename='img1.jpg') }}">
    <img src="{{ url_for('static', filename='img2.jpg') }}">
    <img src="{{ url_for('static', filename='img3.jpg') }}">
</div> <!--  FIXED -->

<div class="box">
<h2> Select Location</h2>

<form action="/input" method="post">

<input type="hidden" name="disaster" value="{{ disaster }}">

<input name="state" placeholder="State" required>
<input name="district" placeholder="District" required>

<button>Next</button>

</form>
</div>

</body>
</html>
