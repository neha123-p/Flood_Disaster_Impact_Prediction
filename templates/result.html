<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>
/* Full page center */
body {
    margin: 0;
    padding: 0;
    font-family: Arial;

    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;

    background: url('/static/img1.jpg') no-repeat center center/cover;
}

/* Result box */
.box {
    background: rgba(255,255,255,0.9);
    padding: 30px;
    width: 350px;
    border-radius: 15px;
    text-align: center;
    box-shadow: 0 0 20px rgba(0,0,0,0.3);
}

h2 {
    color: #11998e;
}

.result {
    margin: 10px;
    font-size: 18px;
}

/* 🔥 Glow Effects */
.high {
    color: red;
    font-weight: bold;
    text-shadow: 0 0 10px red, 0 0 20px darkred;
}

.medium {
    color: orange;
    font-weight: bold;
    text-shadow: 0 0 10px orange, 0 0 20px gold;
}

.low {
    color: green;
    font-weight: bold;
    text-shadow: 0 0 10px limegreen, 0 0 20px green;
}
</style>
</head>

<body>

<div class="box">
    <h2>Flood Impact Result</h2>

    <p class="result">People Affected: <b>{{ people }}</b></p>
    <p class="result">Number of Deaths: <b>{{ deaths }}</b></p>
    <p class="result">Agricultural Loss (lakhs): <b>{{ agri }}</b></p>
    <p class="result">Economic Loss (lakhs): <b>{{ economic }}</b></p>
    <p class="result">Infrastructure Damage (%): <b>{{ infra }}</b></p>

    <!-- ✅ SINGLE IMPACT DISPLAY -->
    <h3 class="{{ risk_class }}">
        {{ risk }}
    </h3>

</div>

</body>
</html>
